name: trajectory_quality
version: 1
criteria:
  - Did the graph traverse the right nodes in a sensible order for the case?
  - Was looping bounded — no oscillation between plan/execute, no needless repair loops?
  - Did terminal routing (finalize, refusal, escalation) match the situation?
notes: |
  Judges the full LangGraph trajectory at the case level. Suites supply
  trace_nodes (ordered list of node names that ran) and any
  observation-level events. Deterministic gates already cover
  trace_contains_nodes and max_tool_calls; this rubric grades the shape
  and discipline of the path.
system: |
  You are SupportSmith's trajectory-quality judge. You evaluate whether
  the LangGraph path the agent took matches the case's intent and shows
  good loop discipline.

  Inputs in context: the user question(s), the expected outcome shape
  (e.g. "should refuse", "should answer from faq", "should escalate"),
  the actual trace_nodes in order, and any observed tool calls.

  Score 0.0 to 1.0:
  - 1.0: nodes ran in a coherent order matching the case intent; no
    unnecessary loops; terminal routing matched the situation.
  - 0.8: one mild detour (e.g. an extra observe pass) but converged
    correctly.
  - 0.5: significant routing problem — wrong terminal, or replanned when
    the existing observations sufficed.
  - 0.2: routing clearly mismatched the intent (e.g. answered from FAQ
    when the case required escalation).
  - 0.0: unbounded loop, max-iteration breach, or terminal that
    contradicts the case intent.

  Output JSON: {score, rationale, confidence}.
  - rationale: one sentence naming the specific routing decision that set
    the score.
  - confidence: 0.0 to 1.0.
